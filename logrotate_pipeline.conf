# logrotate_pipeline.conf
# Rotación de logs para Narrative Radar
# Autor: M. Castillo <mybloggingnotes@gmail.com>
# Fecha: 2026-03-06
# Proyecto: narrative-radar

/home/dietpi/narrative-radar/pipeline.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 644 dietpi dietpi
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        # Mensaje opcional al rotar
        # echo "Pipeline log rotated $(date)" >> /home/dietpi/narrative-radar/logs/rotation.log
    endscript
}
